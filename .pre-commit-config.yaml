# Wire-up only — sqlfluff is enabled but only runs on staged SQL.
# Phase 7 will add dbt-checkpoint hooks for model-yml coverage.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint
        additional_dependencies:
          - dbt-core==1.11.8
          - dbt-duckdb==1.10.1
          - sqlfluff-templater-dbt==4.1.0
        args: [--dialect, duckdb, --templater, dbt]
